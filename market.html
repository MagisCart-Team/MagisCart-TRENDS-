<!DOCTYPE html>
<html lang="en" class="bg-blueblack">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/global.css">
    
    <title>MagisCart - Marketplace</title>
    <meta name="description" content="A Dual-Interfaced POS and Inventory System for Official ADNU Student Organizations">
    
    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- tailwind theme -->
    <style type="text/tailwindcss">
    @theme {
        --color-bluelight: #4E68FD;
        --color-blueprimary: #2237AF;
        --color-bluedark: #081563;
        --color-blueblack: #0A0E2A;
        --color-yellowprimary: #F6D560;
        --color-whiteprimary: #DADEEB;
    }
    @theme {
        --background-image-radial-blue: radial-gradient(
        ellipse 70% 65% at 65% 38%,
        rgba(78, 104, 253, 0.75) 0%,
        #2237AF 40%,
        #081563 70%,
        #0A0E2A 100%
        );
    }
    </style>
</head>

<body class="bg-radial-blue">
    <!-- Nav -->
    <nav class="px-10 py-10">
        <!-- <span class="nav-logo"><img src="/assets/images/magiscart_logo.png" alt="magiscart logo" class="h-10 w-auto"></span> -->
        <span class="text-blue-800 text-2xl"><span class="font-bold">MAGIS</span>CART</span>
    </nav>

    <!-- Header, Search bars, and Gallery -->
    <div class="flex flex-col gap-10 min-h-screen">
        <div class="flex flex-col gap-6 justify-center items-center">
            <h1 class="text-7xl font-bold text-whiteprimary text-center tracking-tighter">Where are you<br><span class="text-yellowprimary">shopping</span> today?</h1>
            <p class="text-yellowprimary text-center text-[0.85rem] font-thin -mt-2 pb-4">Search and choose an organization below to browse items and checkout.</p>
            
            <div class="flex gap-5">
                <input type="text" name="orgSearch" id="org-search-input" placeholder="Search organizations" class="w-100 px-4 py-3 rounded-xl bg-whiteprimary text-zinc-600 text-[0.8rem] outline-none focus:ring-2 focus:ring-blueprimary">
                <input type="text" name="shopCode" id="shop-code-input" placeholder="Enter Shop Code" class="px-4 py-3 rounded-xl bg-whiteprimary text-zinc-600 text-[0.8rem] outline-none w-36 focus:ring-2 focus:ring-blueprimary">
            </div>
        </div>

        <div class="w-fit mx-auto">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 grid-rows-3 gap-4">
                <div class="w-54 h-60 bg-whiteprimary rounded-lg flex flex-col" data-name="tactics" data-code="#">
                    <img src="./assets/images/tactics_logo.png" alt="tactics logo" class="w-40 mx-auto">
                    <h1 class="text-center font-bold text-blueprimary text-2xl -mt-1 pb-2">TACTICS</h1>
                    <p class="text-[0.55rem] text-center px-4 pb-2 text-blueprimary">The Ateneo Consortium of Technological, Information, and Computing Sciences</p>
                </div>
                <div class="w-54 h-60 bg-whiteprimary rounded-lg" data-name="#" data-code="#"></div>
                <div class="w-54 h-60 bg-whiteprimary rounded-lg" data-name="#" data-code="#"></div>
                <div class="w-54 h-60 bg-whiteprimary rounded-lg" data-name="#" data-code="#"></div>
                <div class="w-54 h-60 bg-whiteprimary rounded-lg" data-name="#" data-code="#"></div>
                <div class="w-54 h-60 bg-whiteprimary rounded-lg" data-name="#" data-code="#"></div>
                <div class="w-54 h-60 bg-whiteprimary rounded-lg" data-name="#" data-code="#"></div>
                <div class="w-54 h-60 bg-whiteprimary rounded-lg" data-name="#" data-code="#"></div>
                <div class="w-54 h-60 bg-whiteprimary rounded-lg" data-name="#" data-code="#"></div>
                <div class="w-54 h-60 bg-whiteprimary rounded-lg" data-name="#" data-code="#"></div>
                <div class="w-54 h-60 bg-whiteprimary rounded-lg" data-name="#" data-code="#"></div>
                <div class="w-54 h-60 bg-whiteprimary rounded-lg" data-name="#" data-code="#"></div>
            </div>
        </div>
    </div>
</body>
</html>
