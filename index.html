<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <title>MagisCart</title>
    <meta name="description" content="A Dual-Interfaced POS and Inventory System for Official ADNU Student Organizations">

    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-bluelight:     #4E68FD;
            --color-blueprimary:   #2237AF;
            --color-bluedark:      #081563;
            --color-blueblack:     #0A0E2A;
            --color-yellowprimary: #F6D560;
            --color-whiteprimary:  #DADEEB;
            --color-greyprimary:   #D9D9D9;
        }

        /* ── Keyframes ── */
        /* @keyframes fadeUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        } */

        /* ── Utilities ── */
        /* .animate-fade-up { animation: fadeUp 0.5s ease both; }
        .delay-0 { animation-delay: 0.00s; }
        .delay-1 { animation-delay: 0.10s; }
        .delay-2 { animation-delay: 0.20s; }
        .delay-3 { animation-delay: 0.32s; }
        .delay-4 { animation-delay: 0.44s; } */

        /* Nav underline links — identical to marketplace */
        .nav-link {
            position: relative;
            color: rgba(218,222,235,0.38);
            font-size: 0.7rem;
            letter-spacing: 0.13em;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 1px;
            background: #F6D560;
            transition: width 0.24s ease;
        }
        .nav-link:hover { color: #F6D560; }
        .nav-link:hover::after { width: 100%; }

        /* Primary CTA button */
        .btn-primary {
            transition:
                transform 0.2s cubic-bezier(.22,.68,0,1.2),
                box-shadow 0.2s ease,
                background 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 16px 40px rgba(246,213,96,0.22);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }

        /* Secondary CTA button */
        .btn-secondary {
            transition:
                transform 0.2s cubic-bezier(.22,.68,0,1.2),
                box-shadow 0.2s ease,
                background 0.2s ease,
                border-color 0.2s ease;
        }
        .btn-secondary:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 16px 40px rgba(78,104,253,0.18);
            background: rgba(78,104,253,0.12);
            border-color: rgba(78,104,253,0.6);
        }
        .btn-secondary:active {
            transform: scale(0.97);
        }
    </style>
</head>

<body class="min-h-screen overflow-x-hidden" style="background:#0A0E2A;">

    <!-- Radial gradient background — same as marketplace -->
    <div class="fixed inset-0 z-0 pointer-events-none"
         style="background: radial-gradient(ellipse 75% 62% at 62% 32%,
                rgba(78,104,253,0.68) 0%,
                #2237AF 38%,
                #081563 68%,
                #0A0E2A 100%);"></div>

    <!-- Subtle grid overlay — same as marketplace -->
    <div class="fixed inset-0 z-0 pointer-events-none"
         style="background-image:
                    repeating-linear-gradient(rgba(78,104,253,0.055) 0px,rgba(78,104,253,0.055) 1px,transparent 1px,transparent 48px),
                    repeating-linear-gradient(90deg,rgba(78,104,253,0.055) 0px,rgba(78,104,253,0.055) 1px,transparent 1px,transparent 48px);"></div>

    <!-- Page -->
    <div class="relative z-10 flex flex-col min-h-screen">

        <!-- ── Nav — identical structure to marketplace ── -->
        <nav class="px-10 py-8 flex items-center justify-between">
            <span class="text-2xl tracking-tight">
                <span class="text-blueprimary font-bold">MAGIS</span><span class="text-whiteprimary">CART</span>
            </span>
            <!-- <div class="flex items-center gap-7">
                <a href="market.html" class="nav-link">Marketplace</a>
                <a href="login.html"  class="nav-link">Officer Login</a>
                <a href="#"           class="nav-link">Help</a>
            </div> -->
        </nav>

        <!-- ── Hero ── -->
        <section class="flex flex-col justify-center items-center text-center flex-1 px-4 py-24 gap-5">

            <!-- Eyebrow label — same style as marketplace -->
            <div class="text-[0.62rem] tracking-[0.22em] uppercase"
                 style="color:rgba(218,222,235,0.28);">
                ADNU Student Organizations
            </div>

            <!-- Headline -->
            <h1 class="font-bold text-center tracking-tighter leading-none"
                style="font-size:clamp(3rem,7vw,5rem); color:#DADEEB;">
                Empowering<br>
                <span class="text-yellowprimary relative inline-block">
                    Campus Commerce
                    <span class="absolute left-0 -bottom-1.5 w-full h-0.5 rounded-full"
                          style="background:rgba(246,213,96,0.28);"></span>
                </span>
            </h1>

            <!-- Subtext — same muted style as marketplace -->
            <p class="text-center text-[0.85rem] max-w-md"
               style="color:rgba(218,222,235,0.38);">
                A centralized hub for Ateneo de Naga University student organization
                merchandise and inventory management.
            </p>

            <!-- CTA buttons -->
            <div class="flex gap-3 flex-wrap justify-center pt-4">

                <!-- Primary: yellow, filled -->
                <a href="market.html"
                   class="btn-primary flex items-center gap-2 px-8 py-3 rounded-2xl
                          bg-yellowprimary text-bluedark font-bold text-[0.85rem]
                          tracking-tight cursor-pointer">
                    Explore Marketplace
                    <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </a>

                <!-- Secondary: ghost with border -->
                <a href="login.html"
                   class="btn-secondary flex items-center gap-2 px-8 py-3 rounded-2xl
                          border text-whiteprimary font-bold text-[0.85rem]
                          tracking-tight cursor-pointer"
                   style="border-color:rgba(218,222,235,0.18); background:rgba(218,222,235,0.06);">
                    Officer Login
                    <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/>
                    </svg>
                </a>
            </div>

            <!-- Divider line — same as marketplace section divider -->
            <div class="flex items-center gap-4 mt-16 w-full max-w-md">
                <div class="h-px flex-1" style="background:rgba(218,222,235,0.07);"></div>
                <span class="text-[0.62rem] tracking-[0.18em] uppercase"
                      style="color:rgba(218,222,235,0.22);">Built for ADNU Orgs</span>
                <div class="h-px flex-1" style="background:rgba(218,222,235,0.07);"></div>
            </div>

            <!-- Feature pills -->
            <div class="flex flex-wrap justify-center gap-3 max-w-lg">
                <span class="px-4 py-2 rounded-2xl text-[0.7rem] tracking-wide"
                      style="background:rgba(78,104,253,0.12); color:rgba(218,222,235,0.55); border:1px solid rgba(78,104,253,0.2);">
                    📦 Inventory Management
                </span>
                <span class="px-4 py-2 rounded-2xl text-[0.7rem] tracking-wide"
                      style="background:rgba(78,104,253,0.12); color:rgba(218,222,235,0.55); border:1px solid rgba(78,104,253,0.2);">
                    🛒 Student Marketplace
                </span>
                <span class="px-4 py-2 rounded-2xl text-[0.7rem] tracking-wide"
                      style="background:rgba(78,104,253,0.12); color:rgba(218,222,235,0.55); border:1px solid rgba(78,104,253,0.2);">
                    🧾 Point of Sale
                </span>
            </div>

        </section>
    </div>

</body>
</html>
